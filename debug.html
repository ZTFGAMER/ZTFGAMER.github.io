<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>大巴扎 · 调试配置</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0f0f1a;
      color: #ddd;
      min-height: 100vh;
      font-size: 13px;
    }

    /* ---- Header ---- */
    .header {
      background: #1a1a2e;
      border-bottom: 1px solid #2a2a4a;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header h1 { font-size: 15px; font-weight: 700; color: #fff; }
    .header-right { display: flex; align-items: center; gap: 8px; }
    #sync-badge {
      font-size: 12px;
      color: #5ecc5e;
      background: #1a3a1a;
      border: 1px solid #3a6a3a;
      border-radius: 12px;
      padding: 2px 10px;
      transition: opacity 0.5s;
    }
    .btn-open-game {
      font-size: 12px;
      color: #99aaff;
      background: #1a1a3a;
      border: 1px solid #3a3a6a;
      border-radius: 12px;
      padding: 3px 10px;
      cursor: pointer;
      text-decoration: none;
    }
    .btn-open-game:hover { background: #2a2a4a; }
    .btn-save {
      font-size: 12px;
      color: #b7ffd4;
      background: #153328;
      border: 1px solid #2b6a52;
      border-radius: 12px;
      padding: 3px 10px;
      cursor: pointer;
    }
    .btn-save:hover { background: #1f4738; }

    .search-bar {
      max-width: 600px;
      padding: 8px 16px;
      border-bottom: 1px solid #1e1e30;
      background: #111126;
      display: flex;
      align-items: center;
      gap: 8px;
      position: sticky;
      top: 47px;
      z-index: 90;
    }
    .search-input {
      flex: 1;
      background: #1e1e30;
      color: #eee;
      border: 1px solid #3a3a5a;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 12px;
      outline: none;
    }
    .search-input:focus { border-color: #5577ff; }
    .search-count {
      flex-shrink: 0;
      font-size: 11px;
      color: #99a6ff;
      min-width: 78px;
      text-align: right;
    }

    /* ---- Dropdown section ---- */
    .section-dropdown {
      max-width: 600px;
      border-bottom: 1px solid #1e1e30;
    }
    .section-dropdown summary {
      list-style: none;
      cursor: pointer;
      user-select: none;
      font-size: 12px;
      font-weight: 700;
      color: #aab3ff;
      padding: 10px 16px;
      background: #141428;
      border-top: 1px solid #1e1e30;
    }
    .section-dropdown summary::-webkit-details-marker { display: none; }
    .section-dropdown summary::after {
      content: '▾';
      float: right;
      color: #7780cc;
    }
    .section-dropdown:not([open]) summary::after {
      content: '▸';
    }

    .sub-dropdown {
      max-width: 600px;
      border-top: 1px solid #1e1e30;
      background: #101022;
    }
    .sub-dropdown summary {
      list-style: none;
      cursor: pointer;
      user-select: none;
      font-size: 12px;
      font-weight: 600;
      color: #99a6ff;
      padding: 8px 16px;
      background: #121228;
    }
    .sub-dropdown summary::-webkit-details-marker { display: none; }
    .sub-dropdown summary::after {
      content: '▾';
      float: right;
      color: #6672bb;
    }
    .sub-dropdown:not([open]) summary::after { content: '▸'; }

    /* ---- Compact param row ---- */
    .param-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 16px;
      border-bottom: 1px solid #1e1e30;
      min-height: 36px;
      max-width: 600px;
    }
    .param-row:hover { background: #16162a; }

    .param-label {
      width: 170px;
      flex-shrink: 0;
      color: #ccd;
      font-size: 12px;
      white-space: nowrap;
      cursor: default;
    }

    .param-slider {
      flex: 1;
      min-width: 60px;
      max-width: 160px;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: #333355;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    .param-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: #5577ff;
      border-radius: 50%;
      border: 1.5px solid #fff;
      cursor: pointer;
    }
    .param-slider::-moz-range-thumb {
      width: 14px;
      height: 14px;
      background: #5577ff;
      border-radius: 50%;
      border: 1.5px solid #fff;
      cursor: pointer;
    }

    .param-value {
      width: 42px;
      flex-shrink: 0;
      color: #ffd700;
      font-size: 13px;
      font-weight: 700;
      text-align: right;
    }
    .param-unit {
      width: 26px;
      flex-shrink: 0;
      color: #666888;
      font-size: 11px;
    }

    .param-num {
      width: 52px;
      flex-shrink: 0;
      background: #1e1e30;
      color: #eee;
      border: 1px solid #3a3a5a;
      border-radius: 5px;
      padding: 3px 6px;
      font-size: 12px;
      text-align: center;
      outline: none;
    }
    .param-num:focus { border-color: #5577ff; }
    .param-num::-webkit-inner-spin-button,
    .param-num::-webkit-outer-spin-button { -webkit-appearance: none; }
    .param-num { -moz-appearance: textfield; }

    .param-color {
      width: 52px;
      height: 26px;
      flex-shrink: 0;
      border: 1px solid #3a3a5a;
      border-radius: 5px;
      background: #1e1e30;
      cursor: pointer;
      padding: 2px;
    }

    .btn-reset {
      width: 28px;
      height: 22px;
      flex-shrink: 0;
      background: #1e1e30;
      color: #777799;
      border: 1px solid #2e2e50;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-reset:hover { background: #2a2a44; color: #aab; }

    /* ---- Bottom bar ---- */
    .bottom-bar {
      position: sticky;
      bottom: 0;
      background: #1a1a2e;
      border-top: 1px solid #2a2a4a;
      padding: 8px 16px;
      display: flex;
      gap: 10px;
    }
    .btn-reset-all {
      flex: 1;
      padding: 8px;
      background: #2a1a1a;
      color: #ff8888;
      border: 1px solid #5a3a3a;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-reset-all:hover { background: #3a2020; }

    /* Tooltip via title — native */
  </style>
</head>
<body>

  <div class="header">
    <h1>🎮 大巴扎 · 调试</h1>
    <div class="header-right">
      <span id="sync-badge">🔗 连接中...</span>
      <button id="btn-copy-config" class="btn-save">复制配置</button>
      <button id="btn-download-defaults" class="btn-save">保存为默认值</button>
      <a class="btn-open-game" href="/" target="_blank">游戏 ↗</a>
    </div>
  </div>

  <div class="search-bar">
    <input id="debug-search" class="search-input" type="text" placeholder="搜索参数（中文/English/key）" />
    <span id="debug-search-count" class="search-count">全部显示</span>
  </div>

  <details class="section-dropdown" id="dropdown-position" open>
    <summary>界面位置</summary>
    <div id="params-position"></div>
  </details>

  <details class="section-dropdown" id="dropdown-font" open>
    <summary>字体大小</summary>
    <div id="params-font"></div>
  </details>

  <details class="section-dropdown" id="dropdown-drag" open>
    <summary>拖拽参数</summary>
    <div id="params-drag"></div>
  </details>

  <details class="section-dropdown" id="dropdown-perspective" open>
    <summary>近大远小设置</summary>
    <div id="params-perspective"></div>
  </details>

  <details class="section-dropdown" id="dropdown-toast" open>
    <summary>Toast 显示</summary>
    <div id="params-toast"></div>
  </details>

  <details class="section-dropdown" id="dropdown-battle-vfx" open>
    <summary>战斗表现</summary>
    <div id="params-battle-vfx"></div>
  </details>

  <details class="section-dropdown" id="dropdown-gameplay" open>
    <summary>玩法数值</summary>
    <div id="params-gameplay"></div>
  </details>

  <details class="section-dropdown" id="dropdown-enemy-data" open>
    <summary>敌人数据</summary>
    <div id="params-enemy-data"></div>
  </details>

  <details class="section-dropdown" id="dropdown-anim-timing" open>
    <summary>动画时长</summary>
    <div id="params-anim-timing"></div>
  </details>

  <details class="section-dropdown" id="dropdown-color" open>
    <summary>颜色配置</summary>
    <div id="params-color"></div>
  </details>

  <!-- 按需逐项调整；不提供“一键重置所有参数” -->

  <script type="module" src="/src/debug/DebugPage.ts"></script>
</body>
</html>
