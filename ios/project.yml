name: BigBazzar
options:
  bundleIdPrefix: com.zhengtengfei
  deploymentTarget:
    iOS: "15.0"
  developmentLanguage: zh-Hans

settings:
  base:
    MARKETING_VERSION: "0.1.6"
    CURRENT_PROJECT_VERSION: "28"
    PRODUCT_BUNDLE_IDENTIFIER: com.zhengtengfei.BigBazzar

targets:
  BigBazzar:
    type: application
    platform: iOS

    sources:
      - path: BigBazzar
        excludes:
          - dist-ios/**

    postBuildScripts:
      - name: Copy Web Dist
        script: |
          set -e
          SRC_DIST="${SRCROOT}/../dist-ios"
          SRC_RESOURCE="${SRCROOT}/../resource"
          DST_DIR="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/dist-ios"
          DST_RESOURCE_DIR="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/resource"
          if [ ! -f "${SRC_DIST}/index.html" ]; then
            echo "error: dist-ios/index.html 不存在，请先执行 npm run build:ios-web"
            exit 1
          fi
          rm -rf "${DST_DIR}"
          mkdir -p "${DST_DIR}"
          cp -R "${SRC_DIST}/." "${DST_DIR}/"
          if [ -d "${SRC_RESOURCE}" ]; then
            rm -rf "${DST_RESOURCE_DIR}"
            mkdir -p "${DST_RESOURCE_DIR}"
            cp -R "${SRC_RESOURCE}/." "${DST_RESOURCE_DIR}/"
          fi

    info:
      path: BigBazzar/Info.plist
      properties:
        CFBundleDisplayName: 手机大巴扎
        CFBundleName: $(PRODUCT_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundlePackageType: APPL
        ITSAppUsesNonExemptEncryption: false
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIStatusBarHidden: true
        UIViewControllerBasedStatusBarAppearance: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        LSApplicationCategoryType: public.app-category.games

    settings:
      base:
        INFOPLIST_FILE: BigBazzar/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.zhengtengfei.BigBazzar
        PRODUCT_NAME: BigBazzar
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
